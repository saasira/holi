name: Bootstrap npm Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish, for example refs/tags/v0.1.3
        required: true
        default: refs/tags/v0.1.3

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${{ inputs.ref }}"
          git checkout --detach FETCH_HEAD

      - name: Install Node 22.14.0
        run: |
          curl -fsSLO https://nodejs.org/dist/v22.14.0/node-v22.14.0-linux-x64.tar.xz
          tar -xJf node-v22.14.0-linux-x64.tar.xz
          echo "${GITHUB_WORKSPACE}/node-v22.14.0-linux-x64/bin" >> "${GITHUB_PATH}"

      - name: Show Node environment
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Validate release
        run: npm run ci:smoke

      - name: Configure npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          printf "%s\n" "@saasira:registry=https://registry.npmjs.org/" > .npmrc
          printf "%s\n" "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
