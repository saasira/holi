        <!-- Holi library tabs (uses HoliApp.providers.holi) -->
        <tabs library="holi" provider="holi" data-source="@{userProfile.addresses}" lazy>
            <div slot="tablink">
                <li><a data-tab="@{index}">@{address.label}</a></li>
            </div>
        </tabs>

        <!-- IBM library tabs (uses IBM providers/styles) -->
        <tabs library="ibm" provider="carbon" data-source="@{dashboard.widgets}">
            <div slot="tablink">
                <li class="ibm-tab"><a data-tab="@{index}">@{widget.title}</a></li>
            </div>
        </tabs>

        <!-- Default library (no library attr) -->
        <tabs provider="default" data-source="@{static.tabs}">
            Static content here
        </tabs>

    </body>
</html>
