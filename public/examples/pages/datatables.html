<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DataTable Example</title>
        <link rel="stylesheet" href="/dist/holi.css">
        <script src="/dist/holi.js"></script>
    </head>
    <body>
        <h1>DataTable Variants</h1>

        <h2>Variant 1A: Pagination (Programmatic)</h2>
        <section
            id="dt-pagination-programmatic"
            component="datatable"
            library="holi"
            data-endpoint="/examples/api/sales"
            data-column-metadata="salesColumnMetadata"
            server-side
            data-mode="pagination"
            data-render-mode="programmatic"
            data-page-size="20"
            data-priority-fields="orderNo,customer,total,status"
            data-mandatory-fields="orderNo,total">
        </section>

        <h2>Variant 1B: Pagination (Template Clone)</h2>
        <section
            id="dt-pagination-template-clone"
            component="datatable"
            library="holi"
            data-endpoint="/examples/api/sales"
            data-column-metadata="salesColumnMetadata"
            server-side
            data-mode="pagination"
            data-render-mode="template-clone"
            data-page-size="20"
            data-priority-fields="orderNo,customer,total,status"
            data-mandatory-fields="orderNo,total">
        </section>

        <h2>Variant 2A: Infinite Scroll (Programmatic)</h2>
        <section
            id="dt-infinite-programmatic"
            role="datatable"
            library="holi"
            data-endpoint="/examples/api/sales"
            data-column-metadata="salesColumnMetadata"
            server-side
            data-mode="infinite"
            data-render-mode="programmatic"
            data-infinite-chunk="30"
            data-priority-fields="orderNo,customer,total,status"
            data-mandatory-fields="orderNo,total">
        </section>

        <h2>Variant 2B: Infinite Scroll (Template Clone)</h2>
        <section
            id="dt-infinite-template-clone"
            role="datatable"
            library="holi"
            data-endpoint="/examples/api/sales"
            data-column-metadata="salesColumnMetadata"
            server-side
            data-mode="infinite"
            data-render-mode="template-clone"
            data-infinite-chunk="30"
            data-priority-fields="orderNo,customer,total,status"
            data-mandatory-fields="orderNo,total">
        </section>
<!--
        <h2>Variant 3: Standard (Local JSON)</h2>
        <datatable id="dt-standard-local" library="holi" data-endpoint="/examples/api/sales.json" data-column-metadata="salesColumnMetadata"></datatable>
-->
        <script>
            window.salesColumnMetadata = {
                orderNo: { required: true, readonly: true, label: 'Order Number', pinned: 'left' },
                customer: { required: true, minLength: 3, label: 'Customer' },
                status: { required: true, formFieldType: 'select', pinned: 'right', lov: ['Active', 'Pending', 'Shipped', 'Closed', 'Refunded'] },
                priority: { formFieldType: 'select', lov: ['High', 'Medium', 'Low'] },
                quantity: { formFieldType: 'number', constraints: { min: 1, max: 5000 } },
                discount: { formFieldType: 'number', constraints: { min: 0 } },
                total: { required: true, formFieldType: 'number', constraints: { min: 0 } },
                currency: { formFieldType: 'select', lov: ['USD', 'EUR', 'INR'] },
                fulfilled: { formFieldType: 'checkbox', label: 'Fulfilled' },
                etaDays: { formFieldType: 'number', constraints: { min: 0, max: 365 } }
            };
        </script>
    </body>
</html>
