<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ThemeSwitcher Example</title>
        <link rel="stylesheet" href="/dist/holi.css">
        <script src="/dist/holi.js"></script>
        <style>
            body {
                margin: 0;
                font-family: "Segoe UI", sans-serif;
                transition: background 180ms ease, color 180ms ease;
            }

            body[theme="presto"] {
                background: #f4ecdf;
                color: #2d241d;
            }

            body[theme="aurora"] {
                background: #ebf6f4;
                color: #1f3330;
            }

            body[theme="atlas"] {
                background: #eceff8;
                color: #202941;
            }

            .theme-demo {
                max-width: 860px;
                margin: 0 auto;
                padding: 32px 20px;
            }

            .theme-demo-card {
                padding: 20px;
                border: 1px solid rgba(120, 110, 100, 0.18);
                border-radius: 14px;
                background: rgba(255, 255, 255, 0.64);
                backdrop-filter: blur(6px);
            }
        </style>
    </head>
    <body theme="presto">
        <main class="theme-demo">
            <div class="theme-demo-card">
                <h1>ThemeSwitcher</h1>
                <p>Switches the real <code>body[theme]</code> attribute and dispatches theme change events.</p>
                <themeswitcher themes="presto:Presto,aurora:Aurora,atlas:Atlas"></themeswitcher>
            </div>
        </main>
    </body>
</html>
